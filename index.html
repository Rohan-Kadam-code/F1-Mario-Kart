<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F1 Mario Kart Visualiser | Race Replay with Power-Up Effects</title>
  <meta name="description" content="Immersive Formula 1 race visualiser with Mario Kart-inspired effects. Replay real F1 races with mushroom boosts, star power, and blue shell animations." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles/index.css" />
  <link rel="stylesheet" href="/src/styles/mario-effects.css" />
  <link rel="stylesheet" href="/src/styles/garage.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <div class="header-left">
        <div class="logo">
          <span class="logo-icon">🏎️</span>
          <h1>F1 <span class="accent">Mario Kart</span> Visualiser</h1>
        </div>
        <button id="garageToggleBtn" class="action-btn" style="margin-left: 20px;">
          <span>🛠️ Garage</span>
        </button>
      </div>
      <div class="header-center" id="sessionSelectorContainer"></div>
      <div class="header-right">
        <button id="fullWindowToggle" class="icon-button" title="Toggle Full Window / Theater Mode">
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="css-i6dzq1"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
        </button>
        <div id="weatherWidget" class="weather-widget"></div>
      </div>
    </header>

    <!-- Main Layout -->
    <main id="mainLayout">
      <!-- Left Sidebar — Driver Panel -->
      <aside id="driverPanel" class="glass-panel">
        <div class="panel-header">
          <h2>🏁 Drivers</h2>
          <span class="lap-indicator" id="lapIndicator">Lap 0/0</span>
        </div>
        <div id="driverList" class="driver-list"></div>
      </aside>

      <!-- Center — Race Canvas -->
      <section id="raceSection">
        <div class="canvas-container" id="canvasContainer">
          <div id="raceTrack3D" class="three-canvas-host"></div>
          <div id="effectOverlay" class="effect-overlay"></div>
          <div id="miniMap" class="mini-map-hud"></div>
          <div id="loadingOverlay" class="loading-overlay">
            <div class="loader">
              <div class="loader-kart">🏎️</div>
              <p>Loading Race Data...</p>
              <div class="loader-bar"><div class="loader-fill" id="loaderFill"></div></div>
            </div>
          </div>
        </div>
        <!-- Playback Controls -->
        <div id="playbackControls" class="glass-panel playback-bar"></div>
      </section>

      <!-- Right Sidebar — Event Feed -->
      <aside id="eventPanel" class="glass-panel">
        <div class="panel-header">
          <h2>📡 Live Feed</h2>
        </div>
        <div id="eventFeed" class="event-feed"></div>
      </aside>
    </main>

    <!-- Bottom Bar — Race Info -->
    <footer id="raceInfoBar" class="glass-panel"></footer>

    <!-- Garage Mode Overlay -->
    <div id="garagePanel" class="garage-overlay hidden">
      <div class="garage-sidebar glass-panel">
        <div class="panel-header">
          <h2>🛠️ Customizer</h2>
          <button id="closeGarageBtn" class="action-btn close-btn">Return to Track</button>
        </div>
        
        <div class="garage-controls">
          <!-- Driver Selector -->
          <div class="control-group">
            <label>Select Driver</label>
            <div class="driver-nav">
              <button id="garagePrevBtn">◀</button>
              <div id="garageCurrentDriver" class="current-driver-display">---</div>
              <button id="garageNextBtn">▶</button>
            </div>
          </div>

          <!-- Color Picker -->
          <div class="control-group">
            <label>Team Paint</label>
            <input type="color" id="garageColorPicker" value="#000000">
            <button id="garageResetColorBtn" class="small-btn">Reset to Default</button>
          </div>

          <!-- Driver Details -->
          <div class="control-group">
            <label>Driver Abbreviation (3 Letters)</label>
            <input type="text" id="garageAbbrInput" maxlength="3" oninput="this.value = this.value.toUpperCase()">
            <label>Driver Number</label>
            <input type="number" id="garageNumInput" min="1" max="99">
          </div>

          <!-- Tire Strategy -->
          <div class="control-group">
            <label>Tire Compound</label>
            <div class="compound-selector">
              <button class="compound-btn" data-compound="SOFT">🔴 Soft</button>
              <button class="compound-btn" data-compound="MEDIUM">🟡 Med</button>
              <button class="compound-btn" data-compound="HARD">⚪ Hard</button>
              <button class="compound-btn" data-compound="WET">🔵 Wet</button>
            </div>
          </div>

          <!-- Studio Settings -->
          <div class="control-group studio-header">
            <label>Studio Settings</label>
            <div class="studio-controls-grid">
              <div class="studio-row">
                <span>Intensity</span>
                <input type="range" id="garageLightIntensity" min="0" max="2000" value="500">
              </div>
              <div class="studio-row">
                <span>Bloom</span>
                <input type="range" id="garageBloomIntensity" min="0" max="2" step="0.1" value="0.4">
              </div>
              <div class="studio-row">
                <span>Podium</span>
                <input type="checkbox" id="garageShowBase" checked>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
